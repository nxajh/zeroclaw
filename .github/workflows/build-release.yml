name: Build Release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'release-fast'
        type: choice
        options:
          - release
          - release-fast
          - ci

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mold

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Build
        run: cargo build --profile ${{ github.event.inputs.profile || 'release-fast' }} --locked --target x86_64-unknown-linux-gnu
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-linux-x86_64
          path: target/x86_64-unknown-linux-gnu/${{ github.event.inputs.profile == 'release' && 'release' || github.event.inputs.profile || 'release-fast' }}/zeroclaw
          retention-days: 7
